<!DOCTYPE html>
<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
<form method="post">

	<label for="name">Name</label>
	<input type="text" required id="name" ><br><br>

	<label for="email">Email</label>
	<input type="email" required id="email" ><br><br>

	<label for="gender_m">Male</label>
	<input type="radio" name="gender" id="gender_m" value="male" required>

	<label for="gender_f">Female</label>
	<input type="radio" name="gender" id="gender_f" value="female"><br><br>

	<label for="cars">Select a Car</label>
	<select id="cars" >
		<option value="">--Please choose an option--</option>
		<option value="bmw">BMW</option>
		<option value="audi">Audi</option>
		<option value="mercedez">Mercedez</option>
	</select><br><br>

	<label for="age">Car Age</label>
	<input type="number" id="carage"  required><br><br>

	<label for="dob">Date of Purchase</label>
	<input type="date" required id="dop" required><br><br>

	
	<label for="password">Password</label>
	<input type="password" id="password"  required><br><br>

	
	<button type="submit">Submit</button>

</form>

<script src="./script.js"></script>
</body>
</html>
